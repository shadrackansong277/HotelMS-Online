<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Grand Vista HMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#C9A84C;--accent2:#E8C97A;--accent-dim:#8B6F2E;
  --bg0:#0D0F14;--bg1:#13161D;--bg2:#1A1E27;--bg3:#222733;--bg4:#2A3040;
  --bdr:#2E3545;--bdr2:#3A4256;
  --t0:#F0F2F7;--t1:#B8BFCC;--t2:#737A8F;--t3:#4A5068;
  --green:#3DDC84;--green-bg:#1A3028;--green-bdr:#1f4033;
  --red:#F05252;--red-bg:#301818;--red-bdr:#3a1818;
  --amber:#F5A623;--amber-bg:#2E2010;--amber-bdr:#3a2810;
  --blue:#4D9EF5;--blue-bg:#102030;--blue-bdr:#102438;
  --nav-w:212px;--radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--t0);height:100vh;overflow:hidden;}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(201,168,76,.07),transparent 70%);}
.login-box{background:var(--bg1);border:1px solid var(--bdr2);border-radius:16px;padding:40px 36px;width:380px;position:relative;z-index:1;}
.login-logo{width:48px;height:48px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#0D0F14;margin:0 auto 20px;}
.login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:4px;}
.login-sub{text-align:center;font-size:12px;color:var(--t2);margin-bottom:28px;}
.lf-group{margin-bottom:14px;}
.lf-label{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;}
.lf-input{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;color:var(--t0);font-size:13px;outline:none;transition:border .15s;}
.lf-input:focus{border-color:var(--accent);}
.login-error{background:var(--red-bg);border:1px solid var(--red-bdr);color:var(--red);font-size:12px;padding:8px 12px;border-radius:7px;margin-bottom:12px;display:none;}

/* ── APP SHELL ── */
#app{display:none;height:100vh;flex-direction:column;}
#app.active{display:flex;}
#topbar{height:38px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;flex-shrink:0;gap:10px;}
#tb-logo{font-size:12px;color:var(--accent);font-weight:800;}
#tb-hotel{font-size:11px;color:var(--t2);}
.tb-sp{flex:1;}
#tb-date{font-size:10px;color:var(--t3);}
#app-body{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
#sidebar{width:var(--nav-w);background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;}
.brand{padding:14px 14px 10px;border-bottom:1px solid var(--bdr);}
.brand-icon{width:28px;height:28px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#0D0F14;margin-bottom:6px;}
#hotel-name-disp{font-size:12px;font-weight:700;line-height:1.3;}
.brand-sub{font-size:9px;color:var(--t2);margin-top:2px;}
.nav-body{flex:1;padding:6px 5px;overflow-y:auto;}
.nav-sect{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;padding:10px 8px 3px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--t2);transition:all .15s;margin-bottom:1px;position:relative;user-select:none;}
.nav-item:hover{background:var(--bg2);color:var(--t1);}
.nav-item.active{background:var(--bg3);color:var(--accent);font-weight:600;}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:14px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-icon{font-size:13px;width:15px;text-align:center;flex-shrink:0;}
.nav-foot{padding:7px 6px;border-top:1px solid var(--bdr);}
.user-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;background:var(--bg2);}
.uav{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent2);flex-shrink:0;}
.u-name{font-size:11px;font-weight:600;}
.u-role{font-size:9px;color:var(--t2);text-transform:capitalize;}
.logout-btn{margin-left:auto;cursor:pointer;font-size:14px;color:var(--t2);background:none;border:none;padding:3px;border-radius:4px;}
.logout-btn:hover{color:var(--red);}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}

/* ── MAIN ── */
#main-area{flex:1;display:flex;flex-direction:column;min-width:0;}
#page-topbar{padding:11px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--bg1);flex-shrink:0;}
#page-title{font-size:14px;font-weight:700;}
#page-sub{font-size:10px;color:var(--t2);margin-top:1px;}
.tb-right{display:flex;gap:8px;align-items:center;}
#content{flex:1;overflow-y:auto;padding:16px;background:var(--bg0);}

/* ── BUTTONS ── */
.btn{padding:7px 13px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bdr2);background:var(--bg2);color:var(--t1);transition:all .15s;letter-spacing:.02em;}
.btn:hover{background:var(--bg3);color:var(--t0);}
.btn-gold{background:var(--accent);color:#0D0F14;border-color:var(--accent);}
.btn-gold:hover{background:var(--accent2);border-color:var(--accent2);}
.btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bdr);}
.btn-red:hover{background:#3a2020;}
.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bdr);}
.btn-sm{padding:4px 9px;font-size:10px;}

/* ── METRICS ── */
.metrics{display:grid;gap:10px;margin-bottom:14px;}
.m5{grid-template-columns:repeat(5,minmax(0,1fr));}
.m4{grid-template-columns:repeat(4,minmax(0,1fr));}
.m3{grid-template-columns:repeat(3,minmax(0,1fr));}
.m2{grid-template-columns:repeat(2,minmax(0,1fr));}
.metric{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--radius);padding:13px 15px;}
.m-lbl{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.m-val{font-size:21px;font-weight:700;}
.m-sub{font-size:10px;color:var(--t2);margin-top:3px;}

/* ── CARD ── */
.card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--radius);padding:15px;}
.card-hd{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{font-size:9px;font-weight:700;color:var(--t2);text-align:left;padding:7px 9px;border-bottom:1px solid var(--bdr);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
tbody td{padding:8px 9px;border-bottom:1px solid var(--bdr);color:var(--t1);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg2);}

/* ── BADGES ── */
.badge{font-size:9px;padding:3px 7px;border-radius:9px;display:inline-block;font-weight:600;white-space:nowrap;}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bdr);}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bdr);}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bdr);}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bdr);}
.b-gray{background:var(--bg3);color:var(--t2);border:1px solid var(--bdr);}
.b-gold{background:rgba(201,168,76,.15);color:var(--accent);border:1px solid rgba(201,168,76,.3);}

/* ── FORMS ── */
.fg{margin-bottom:11px;}
.fl{font-size:9px;font-weight:700;color:var(--t2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.fi{width:100%;padding:8px 10px;border:1px solid var(--bdr2);border-radius:7px;font-size:12px;background:var(--bg2);color:var(--t0);outline:none;transition:border .15s;}
.fi:focus{border-color:var(--accent);}
select.fi option{background:var(--bg2);}
textarea.fi{resize:vertical;min-height:60px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.form-hint{font-size:10px;color:var(--t2);margin-top:3px;}

/* ── ROOM GRID ── */
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px;}
.room-cell{border:1px solid var(--bdr);border-radius:8px;padding:9px 5px;text-align:center;transition:all .15s;font-size:10px;}
.r-num{font-size:12px;font-weight:700;}
.r-type{font-size:8px;color:var(--t2);margin-top:2px;}
.r-badge{font-size:8px;margin-top:4px;padding:2px 4px;border-radius:7px;display:inline-block;}
.r-guest{font-size:8px;color:var(--t2);margin-top:3px;}
.r-av{background:var(--green-bg);border-color:var(--green-bdr);}.r-av .r-badge{background:var(--green-bg);color:var(--green);}
.r-oc{background:var(--red-bg);border-color:var(--red-bdr);}.r-oc .r-badge{background:var(--red-bg);color:var(--red);}
.r-hk{background:var(--amber-bg);border-color:var(--amber-bdr);}.r-hk .r-badge{background:var(--amber-bg);color:var(--amber);}
.r-rs{background:var(--blue-bg);border-color:var(--blue-bdr);}.r-rs .r-badge{background:var(--blue-bg);color:var(--blue);}
.r-ss{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);}.r-ss .r-badge{background:rgba(201,168,76,.15);color:var(--accent);}

/* ── TIMER ── */
.timer-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--accent);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;}
.timer-badge.urgent{background:var(--red-bg);border-color:var(--red-bdr);color:var(--red);}
.timer-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── HK ── */
.hk-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:11px 13px;margin-bottom:7px;}
.hk-rm{font-size:14px;font-weight:700;color:var(--accent);min-width:44px;}
.hk-inf{flex:1;}
.hk-task{font-size:11px;color:var(--t1);}
.hk-sub{font-size:9px;color:var(--t2);margin-top:2px;}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;}
#modal-overlay.open{display:flex;}
.modal{background:var(--bg1);border:1px solid var(--bdr2);border-radius:12px;padding:22px;width:500px;max-width:96vw;max-height:88vh;overflow-y:auto;}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-title{font-size:14px;font-weight:700;}
.modal-x{cursor:pointer;font-size:20px;color:var(--t2);background:none;border:none;line-height:1;padding:2px;}
.modal-x:hover{color:var(--red);}

/* ── LEGEND ── */
.legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2);}
.ld{width:8px;height:8px;border-radius:2px;}
.ld-av{background:var(--green);}.ld-oc{background:var(--red);}.ld-hk{background:var(--amber);}.ld-rs{background:var(--blue);}.ld-ss{background:var(--accent);}

/* ── CHART ── */
.ch-wrap{position:relative;width:100%;height:180px;}

/* ── STAFF ── */
.staff-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:11px;}
.staff-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--radius);padding:15px;text-align:center;}
.sav{width:40px;height:40px;border-radius:50%;background:var(--accent-dim);margin:0 auto 9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent2);}
.s-name{font-size:12px;font-weight:700;}.s-role{font-size:9px;color:var(--t2);margin:3px 0 8px;text-transform:capitalize;}

/* ── SETTINGS ── */
.settings-section{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--radius);padding:16px;margin-bottom:13px;}
.settings-title{font-size:11px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between;}
.color-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.color-row label{font-size:11px;color:var(--t1);flex:1;}
.color-row input[type=color]{width:38px;height:28px;border:1px solid var(--bdr2);border-radius:5px;cursor:pointer;background:none;padding:1px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--bdr2);padding:10px 16px;border-radius:9px;font-size:12px;z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;max-width:320px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success{border-color:var(--green);color:var(--green);}
#toast.error{border-color:var(--red);color:var(--red);}

/* ── PRINT ── */
#print-area{display:none;}
@media print{body *{visibility:hidden;}#print-area,#print-area *{visibility:visible;}#print-area{position:absolute;inset:0;padding:28px;background:#fff;color:#000;}}

/* ── ACCESS DENIED ── */
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;color:var(--t2);}
.access-denied .icon{font-size:40px;margin-bottom:12px;}
.access-denied p{font-size:14px;font-weight:600;color:var(--t1);}
.access-denied small{font-size:11px;margin-top:5px;}

/* ── MULTI-HOTEL CARD ── */
.hotel-stat-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--radius);padding:16px;}
.hotel-stat-name{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;}
.hotel-stat-addr{font-size:9px;color:var(--t2);margin-bottom:10px;}
.hotel-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.mini-stat{padding:8px;background:var(--bg2);border-radius:7px;}
.ms-l{font-size:8px;color:var(--t2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;}
.ms-v{font-size:15px;font-weight:700;}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">H</div>
    <div class="login-title">Hotel Management System</div>
    <div class="login-sub">Sign in to your property account</div>
    <div id="login-error" class="login-error"></div>
    <div class="lf-group">
      <label class="lf-label">Property</label>
      <select class="lf-input" id="sel-hotel"></select>
    </div>
    <div class="lf-group">
      <label class="lf-label">Username</label>
      <input class="lf-input" id="inp-user" placeholder="username" autocomplete="username"/>
    </div>
    <div class="lf-group">
      <label class="lf-label">Password</label>
      <input class="lf-input" id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-gold" style="width:100%;margin-top:6px;padding:10px;" onclick="doLogin()">Sign In</button>
    <div style="font-size:10px;color:var(--t3);text-align:center;margin-top:14px;line-height:2;">
      admin / admin123 &nbsp;·&nbsp; manager / manager123 &nbsp;·&nbsp; receptionist / recept123
    </div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div id="topbar">
    <span id="tb-logo">HMS</span>
    <span id="tb-hotel"></span>
    <div class="tb-sp"></div>
    <span id="tb-date"></span>
  </div>
  <div id="app-body">
    <div id="sidebar">
      <div class="brand">
        <div class="brand-icon">H</div>
        <div id="hotel-name-disp"></div>
        <div class="brand-sub">Management System</div>
      </div>
      <div class="nav-body" id="nav-body"></div>
      <div class="nav-foot">
        <div class="user-row">
          <div class="uav" id="nav-uav"></div>
          <div><div class="u-name" id="nav-uname"></div><div class="u-role" id="nav-urole"></div></div>
          <div class="online-dot"></div>
          <button class="logout-btn" onclick="doLogout()" title="Sign out">⏏</button>
        </div>
      </div>
    </div>
    <div id="main-area">
      <div id="page-topbar">
        <div><div id="page-title">Dashboard</div><div id="page-sub"></div></div>
        <div class="tb-right" id="tb-right"></div>
      </div>
      <div id="content"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-x" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toast"></div>
<div id="print-area"></div>

<script>
// ══════════════════════════════════════════════════════
// STATE & CONSTANTS
// ══════════════════════════════════════════════════════
let CU = null;           // current user
let timers = {};         // short-stay countdown timers
let charts = {};         // chart.js instances
const ROLES = { admin:3, manager:2, receptionist:1 };
const hasRole = m => (ROLES[CU?.role]||0) >= ROLES[m];

// ══════════════════════════════════════════════════════
// API LAYER — all fetch calls go through here
// ══════════════════════════════════════════════════════
async function api(method, url, body) {
  try {
    const opts = { method, credentials: 'same-origin', headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    if (res.status === 401) { doLogout(); return { ok: false, error: 'Session expired' }; }
    return await res.json();
  } catch (e) {
    return { ok: false, error: 'Network error: ' + e.message };
  }
}
const GET  = url      => api('GET',    url);
const POST = (url, b) => api('POST',   url, b);
const PUT  = (url, b) => api('PUT',    url, b);
const DEL  = url      => api('DELETE', url);

// ══════════════════════════════════════════════════════
// BOOTSTRAP
// ══════════════════════════════════════════════════════
async function init() {
  const hotels = await GET('/api/hotels');
  const sel = document.getElementById('sel-hotel');
  sel.innerHTML = (hotels||[]).map(h => `<option value="${h.id}">${h.name}</option>`).join('');
  document.getElementById('inp-pass').onkeydown = e => { if (e.key === 'Enter') doLogin(); };
  // Restore existing session
  const me = await GET('/api/me');
  if (me.ok) { CU = me.user; launchApp(); }
}

async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pass').value;
  if (!username || !password) { showLoginErr('Enter username and password.'); return; }
  const res = await POST('/api/login', { username, password });
  if (!res.ok) { showLoginErr(res.error); return; }
  CU = res.user;
  applyTheme(CU.accent_color, CU.bg_color);
  launchApp();
}

function showLoginErr(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function applyTheme(accent, bg) {
  if (accent) document.documentElement.style.setProperty('--accent', accent);
  if (bg)     document.documentElement.style.setProperty('--bg0',    bg);
}

function launchApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('hotel-name-disp').textContent = CU.hotel_name;
  document.getElementById('tb-hotel').textContent        = '· ' + CU.hotel_name;
  document.getElementById('nav-uav').textContent         = initials(CU.full_name);
  document.getElementById('nav-uname').textContent       = CU.full_name;
  document.getElementById('nav-urole').textContent       = CU.role;
  document.getElementById('tb-date').textContent         =
    new Date().toLocaleDateString('en-GB', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  buildNav();
  navigate('dashboard');
  // Refresh timers every 30s when on relevant pages
  setInterval(() => {
    const p = currentPage();
    if (p === 'rooms' || p === 'checkin') refreshTimers();
  }, 30000);
}

async function doLogout() {
  await POST('/api/logout');
  CU = null;
  clearAllTimers();
  destroyCharts();
  document.getElementById('app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
  init();
}

function buildNav() {
  const items = [
    { sect: 'Overview' },
    { id: 'dashboard',   icon: '▦', label: 'Dashboard' },
    { sect: 'Front Desk' },
    { id: 'reservations',icon: '◈', label: 'Reservations' },
    { id: 'checkin',     icon: '⇅', label: 'Check-in / Out' },
    { id: 'rooms',       icon: '▤', label: 'Rooms' },
    { sect: 'Operations' },
    { id: 'housekeeping',icon: '✦', label: 'Housekeeping' },
    { id: 'guests',      icon: '◉', label: 'Guests' },
    { sect: 'Finance', minRole: 'manager' },
    { id: 'billing',     icon: '₵', label: 'Billing & Invoice', minRole: 'manager' },
    { id: 'reports',     icon: '▲', label: 'Reports',           minRole: 'manager' },
    { sect: 'Admin', minRole: 'admin' },
    { id: 'staff',       icon: '⚙', label: 'Staff & Users',     minRole: 'admin' },
    { id: 'settings',    icon: '◎', label: 'Settings',          minRole: 'admin' },
    { id: 'multi-hotel', icon: '⊞', label: 'Multi-Hotel View',  minRole: 'admin' },
  ];
  let html = '';
  items.forEach(it => {
    if (it.sect) {
      if (!it.minRole || hasRole(it.minRole))
        html += `<div class="nav-sect">${it.sect}</div>`;
    } else {
      if (!it.minRole || hasRole(it.minRole))
        html += `<div class="nav-item" id="nav-${it.id}" onclick="navigate('${it.id}')"><span class="nav-icon">${it.icon}</span>${it.label}</div>`;
    }
  });
  document.getElementById('nav-body').innerHTML = html;
}

const PAGE_TITLES = {
  dashboard:'Dashboard', reservations:'Reservations', checkin:'Check-in / Out',
  rooms:'Room Management', housekeeping:'Housekeeping', guests:'Guest Registry',
  billing:'Billing & Invoicing', reports:'Reports & Analytics',
  staff:'Staff & Users', settings:'Settings', 'multi-hotel':'Multi-Hotel Overview'
};

function navigate(page) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + page);
  if (el) el.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  document.getElementById('page-sub').textContent   =
    CU.hotel_name + ' · ' + new Date().toLocaleDateString('en-GB',
      { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('tb-right').innerHTML = '';
  destroyCharts();
  renderPage(page);
}

async function renderPage(page) {
  switch (page) {
    case 'dashboard':   return renderDashboard();
    case 'reservations':return renderReservations();
    case 'checkin':     return renderCheckin();
    case 'rooms':       return renderRooms();
    case 'housekeeping':return renderHousekeeping();
    case 'guests':      return renderGuests();
    case 'billing':     return hasRole('manager') ? renderBilling()     : renderDenied();
    case 'reports':     return hasRole('manager') ? renderReports()     : renderDenied();
    case 'staff':       return hasRole('admin')   ? renderStaff()       : renderDenied();
    case 'settings':    return hasRole('admin')   ? renderSettings()    : renderDenied();
    case 'multi-hotel': return hasRole('admin')   ? renderMultiHotel()  : renderDenied();
    default: $content().innerHTML = '<p style="color:var(--t2);padding:20px;">Page not found.</p>';
  }
}

function renderDenied() {
  $content().innerHTML = `<div class="access-denied"><div class="icon">🔒</div>
    <p>Access Restricted</p><small>Your role (${CU.role}) cannot view this section.</small></div>`;
}

// ROOMS
// ══════════════════════════════════════════════════════
async function renderRooms() {
  const rooms = await GET('/api/rooms');
  if (hasRole('manager'))
    $tbRight(`<button class="btn btn-gold btn-sm" onclick="openNewBooking()">+ New Booking</button>`);

  const STATUS_LABELS = { available:'Available', occupied:'Occupied', housekeeping:'Cleaning', reserved:'Reserved' };
  const available = rooms.filter(r => r.status === 'available').length;
  const occupied  = rooms.filter(r => r.status === 'occupied').length;
  const hk        = rooms.filter(r => r.status === 'housekeeping').length;

  $content().innerHTML = `
    <div class="metrics m3" style="margin-bottom:13px;">
      <div class="metric"><div class="m-lbl">Available</div><div class="m-val" style="color:var(--green)">${available}</div></div>
      <div class="metric"><div class="m-lbl">Occupied</div><div class="m-val" style="color:var(--red)">${occupied}</div></div>
      <div class="metric"><div class="m-lbl">Housekeeping</div><div class="m-val" style="color:var(--amber)">${hk}</div></div>
    </div>
    <div class="card">
      <div class="card-hd">Room Status Map
        <div class="legend" style="margin:0;">
          <div class="li"><div class="ld ld-av"></div>Available</div>
          <div class="li"><div class="ld ld-oc"></div>Occupied</div>
          <div class="li"><div class="ld ld-hk"></div>Cleaning</div>
          <div class="li"><div class="ld ld-rs"></div>Reserved</div>
          <div class="li"><div class="ld ld-ss"></div>Short Stay</div>
        </div>
      </div>
      <div class="rooms-grid">${rooms.map(r => {
        const cls = r.is_short_stay ? 'r-ss'
          : `r-${r.status==='available'?'av':r.status==='occupied'?'oc':r.status==='housekeeping'?'hk':'rs'}`;
        const lbl = r.is_short_stay ? 'Short Stay' : (STATUS_LABELS[r.status] || r.status);
        const timerHtml = (r.is_short_stay && r.booking_short && r.timer_end && r.active_booking_id)
          ? `<div id="timer-${r.active_booking_id}" class="timer-badge" style="margin-top:4px;font-size:8px;"><span class="timer-dot"></span>...</div>` : '';
        return `<div class="room-cell ${cls}">
          <div class="r-num">${r.room_number}</div>
          <div class="r-type">${r.type}</div>
          <div class="r-badge">${lbl}</div>
          ${r.current_guest ? `<div class="r-guest">${r.current_guest.split(' ')[0]}</div>` : ''}
          ${timerHtml}
        </div>`;
      }).join('')}</div>
    </div>`;

  rooms.filter(r => r.is_short_stay && r.timer_end && r.active_booking_id)
    .forEach(r => startTimer(r.active_booking_id, r.timer_end));
}

        plugins:{legend:{display:false}},
        scales:{
          y:{ticks:{callback:v=>'GH₵'+v,color:'#737A8F',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
          x:{ticks:{color:'#737A8F',font:{size:9}},grid:{display:false}}
        }}
    });

    const statuses = {};
    rep.bookings.forEach(b => statuses[b.status] = (statuses[b.status]||0)+1);
    const ctx2 = document.getElementById('c-status');
    if (ctx2) charts['c-status'] = new Chart(ctx2, {
      type:'doughnut',
      data:{ labels:Object.keys(statuses), datasets:[{data:Object.values(statuses),backgroundColor:['#3DDC84','#F5A623','#F05252','#4D9EF5','#C9A84C'],borderWidth:0}]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:true,position:'bottom',labels:{color:'#B8BFCC',font:{size:10},padding:12,boxWidth:10}}}}
    });
  }, 80);
}

async function saveHotelInfo() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { toast('Hotel name is required', 'error'); return; }
  // Read current hotel data first, then only overwrite fields in this form
  const hotels = await GET('/api/hotels/all');
  const hotel  = hotels.find(h => h.id === CU.hotel_id) || {};
  const r = await PUT(`/api/hotels/${CU.hotel_id}`, {
    name,
    address:      document.getElementById('s-addr').value.trim(),
    phone:        document.getElementById('s-phone').value.trim(),
    email:        document.getElementById('s-email').value.trim(),
    tax_rate:     parseFloat(document.getElementById('s-tax').value) || 15,
    accent_color: hotel.accent_color || '#C9A84C',   // preserve existing colors
    bg_color:     hotel.bg_color     || '#0D0F14',
  });
  if (r.ok) {
    CU.hotel_name = name;
    document.getElementById('hotel-name-disp').textContent = name;
    document.getElementById('tb-hotel').textContent = '· ' + name;
    toast('Hotel information saved.', 'success');
  } else toast('Error: ' + r.error, 'error');
}

async function saveColors() {
  const accent = document.getElementById('c-accent').value;
  const bg     = document.getElementById('c-bg').value;
  applyTheme(accent, bg);
  // Read current hotel data to avoid overwriting hotel info fields
  const hotels = await GET('/api/hotels/all');
  const hotel  = hotels.find(h => h.id === CU.hotel_id) || {};
  const r = await PUT(`/api/hotels/${CU.hotel_id}`, {
    name:         hotel.name         || CU.hotel_name,
    address:      hotel.address      || '',
    phone:        hotel.phone        || '',
    email:        hotel.email        || '',
    tax_rate:     hotel.tax_rate     || 15,
    accent_color: accent,
    bg_color:     bg,
  });
  if (r.ok) { CU.accent_color = accent; CU.bg_color = bg; toast('Colors saved and applied.', 'success'); }
  else toast('Error: ' + r.error, 'error');
}

function resetColors() {
  applyTheme('#C9A84C', '#0D0F14');
  document.getElementById('c-accent').value = '#C9A84C';
  document.getElementById('c-bg').value     = '#0D0F14';
}

async function addNewHotel() {
  const name = document.getElementById('nh-name').value.trim();
  const addr = document.getElementById('nh-addr').value.trim();
  const user = document.getElementById('nh-user').value.trim();
  const pass = document.getElementById('nh-pass').value;
  if (!name) { toast('Hotel name is required', 'error'); return; }
  if (!user) { toast('Admin username is required', 'error'); return; }
  if (!pass || pass.length < 6) { toast('Password must be at least 6 characters', 'error'); return; }
  const r = await POST('/api/hotels', { name, address:addr, adminUser:user, adminPass:pass });
  if (r.ok) {
    toast(`Hotel "${name}" created successfully!`, 'success');
    document.getElementById('nh-name').value = '';
    document.getElementById('nh-addr').value = '';
    document.getElementById('nh-user').value = '';
    document.getElementById('nh-pass').value = '';
  } else toast('Error: ' + r.error, 'error');
}

async function execDelete(id) {

function bToggleSS(sel) {
  const isS = sel.options[sel.selectedIndex]?.dataset?.short === '1';

  document.getElementById('b-reg-opts').style.display = isS ? 'none'  : 'block';

async function submitBooking() {
  const name   = document.getElementById('b-name').value.trim();
  const roomId = document.getElementById('b-room').value;
  const checkIn= document.getElementById('b-cin')?.value;
  if (!name)    { toast('Guest name is required', 'error');   return; }
  if (!roomId)  { toast('Please select a room', 'error');     return; }
  if (!checkIn) { toast('Check-in date is required', 'error'); return; }

  const isShort = document.getElementById('b-room').options[document.getElementById('b-room').selectedIndex]?.dataset?.short === '1';
  const r = await POST('/api/bookings', {
    guestData: {
      full_name:   name,
      email:       document.getElementById('b-email').value.trim(),
      phone:       document.getElementById('b-phone').value.trim(),
      id_type:     document.getElementById('b-idtype').value,
      id_number:   document.getElementById('b-idnum').value.trim(),
      nationality: document.getElementById('b-nat').value.trim(),
    },
    roomId, checkIn,
    checkOut:         document.getElementById('b-cout')?.value || '',
    nights:           parseInt(document.getElementById('b-nights')?.value) || 1,
    isShortStay:      isShort,
    shortStayMinutes: parseInt(document.getElementById('b-dur')?.value) || 60,
    extras:           parseFloat(document.getElementById('b-extras').value) || 0,
    notes:            document.getElementById('b-notes').value,
  });
  if (r.ok) { closeModal(); toast(`Booking #${r.ref} created!`, 'success'); renderPage(currentPage()); }
  else toast('Error: ' + r.error, 'error');
}

async function submitWalkIn() {
  const name   = document.getElementById('wi-name').value.trim();
  const roomId = document.getElementById('wi-room').value;
  if (!name)   { toast('Guest name is required', 'error');  return; }
  if (!roomId) { toast('Please select a room', 'error');    return; }
  const isShort = document.getElementById('wi-room').options[document.getElementById('wi-room').selectedIndex]?.dataset?.short === '1';
  const r = await POST('/api/bookings/walkin', {
    guestData: {
      full_name:   name,
      email:       document.getElementById('wi-email').value.trim(),
      phone:       document.getElementById('wi-phone').value.trim(),
      id_type:     document.getElementById('wi-idtype').value,
      id_number:   document.getElementById('wi-idnum').value.trim(),
      nationality: document.getElementById('wi-nat').value.trim(),
    },
    roomId,
    nights:           parseInt(document.getElementById('wi-nights')?.value) || 1,
    isShortStay:      isShort,
    shortStayMinutes: parseInt(document.getElementById('wi-dur')?.value) || 60,
    extras:           parseFloat(document.getElementById('wi-extras').value) || 0,
    notes:            document.getElementById('wi-notes').value,
  });
  if (r.ok) { closeModal(); toast(`Walk-in checked in! Ref: ${r.ref}`, 'success'); renderPage(currentPage()); }
  else toast('Error: ' + r.error, 'error');
}

// ══════════════════════════════════════════════════════
// TIMERS
// ══════════════════════════════════════════════════════
function startTimer(id, endISO) {
  if (timers[id]) clearInterval(timers[id]);
  const tick = () => {
    const rem = new Date(endISO) - new Date();
    const el  = document.getElementById('timer-' + id);
    if (!el) { clearInterval(timers[id]); delete timers[id]; return; }
    if (rem <= 0) {
      el.className = 'timer-badge urgent';
      el.innerHTML = '<span class="timer-dot"></span>EXPIRED';
      return;
    }
    const m = Math.floor(rem / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    el.className = 'timer-badge' + (rem < 600000 ? ' urgent' : '');
    el.innerHTML = `<span class="timer-dot"></span>${m}m ${String(s).padStart(2,'0')}s`;
  };
  tick();
  timers[id] = setInterval(tick, 1000);
}

function clearTimer(id) {
  if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
}

function clearAllTimers() {
  Object.keys(timers).forEach(k => clearInterval(timers[k]));
  timers = {};
}

async function refreshTimers() {
  const rooms = await GET('/api/rooms');
  rooms.filter(r => r.is_short_stay && r.timer_end && r.active_booking_id)
    .forEach(r => startTimer(r.active_booking_id, r.timer_end));
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function $content()  { return document.getElementById('content'); }
function $tbRight(h) { document.getElementById('tb-right').innerHTML = h; }

function sbadge(status) {
  const map = { reserved:'b-blue', checked_in:'b-green', checked_out:'b-gray', cancelled:'b-red', waitlist:'b-amber' };
  return `<span class="badge ${map[status]||'b-gray'}">${(status||'').replace(/_/g,' ')}</span>`;
}

function fmt(n) { return (parseFloat(n)||0).toFixed(2); }

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function initials(name) {
  return (name||'').split(' ').map(w => w[0]||'').join('').slice(0,2).toUpperCase() || '??';
}

function currentPage() {
  const el = document.querySelector('.nav-item.active');
  return el ? el.id.replace('nav-','') : 'dashboard';
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 4000);
}
