services:
  - type: web
    name: grand-vista-hms
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
    disk:
      name: hms-data
      mountPath: /data
      sizeGB: 1
